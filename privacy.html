<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Policy | AutoSpec AI</title>

<style>
:root {
    --bg-color: #ffffff;
    --text-primary: #1a1a1a;
    --text-secondary: #555555;
    --accent: #007AFF;
    --border: #eeeeee;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    color: var(--text-primary);
    background-color: var(--bg-color);
    margin: 0;
}

.container {
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 20px;
}

header {
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
    padding-bottom: 20px;
}

h1 { font-size: 2.2rem; margin: 0; }
.last-updated { color: var(--text-secondary); font-size: 0.9rem; }

select {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1 id="policy-title">Privacy Policy</h1>

<select id="language-selector" onchange="changeLanguage()">
<option value="en">English</option>
<option value="es">Español</option>
</select>

<div class="last-updated" id="last-updated">
Last Updated: May 2, 2026
</div>
</header>

<!-- THIS is where content swaps -->
<div id="content"></div>

</div>

<script>
const englishContent = `
<section>
<p>Welcome to <strong>AutoSpec AI</strong>. We are an automotive-focused platform designed to help users with vehicle-related information, inspections, diagnostics, and AI-powered assistance.</p>

<p>This Privacy Policy explains how we collect, use, disclose, and protect information when you use the AutoSpec AI mobile application, website, and related services.</p>
</section>

<h2>1. Information We Collect</h2>
<h3>A. Account Information</h3>
<ul>
<li>Email address and profile information.</li>
</ul>

<h3>B. Vehicle Information</h3>
<ul>
<li>Vehicle make, model, and year</li>
<li>VIN (Vehicle Identification)</li>
<li>Photos, videos, and screenshots</li>
<li>Inspection and diagnostic information</li>
</ul>

<h2>2. How We Use Information</h2>
<ul>
<li>Provide and operate services.</li>
<li>Improve AI systems.</li>
<li>Prevent fraud.</li>
</ul>

<footer>
<p><strong>Contact:</strong><br>
AutoSpec AI Support<br>
Email: Mod3rnsociety@gmail.com</p>
</footer>
`;

const spanishContent = `
<section>
<p>Bienvenido a <strong>AutoSpec AI</strong>. Somos una plataforma enfocada en automóviles diseñada para ayudar a los usuarios con información de vehículos, inspecciones, diagnósticos y asistencia impulsada por inteligencia artificial.</p>

<p>Esta Política de Privacidad explica cómo recopilamos, usamos, divulgamos y protegemos la información cuando utilizas la aplicación móvil, el sitio web y los servicios relacionados.</p>
</section>

<h2>1. Información que recopilamos</h2>
<h3>A. Información de la cuenta</h3>
<ul>
<li>Correo electrónico e información de perfil.</li>
</ul>

<h3>B. Información del vehículo</h3>
<ul>
<li>Marca, modelo y año</li>
<li>VIN</li>
<li>Fotos, videos y capturas</li>
<li>Datos de diagnóstico</li>
</ul>

<h2>2. Cómo usamos la información</h2>
<ul>
<li>Proporcionar servicios.</li>
<li>Mejorar la IA.</li>
<li>Prevenir fraudes.</li>
</ul>

<footer>
<p><strong>Contacto:</strong><br>
Soporte de AutoSpec AI<br>
Correo: Mod3rnsociety@gmail.com</p>
</footer>
`;

function changeLanguage() {
    const lang = document.getElementById("language-selector").value;

    if (lang === "es") {
        document.getElementById("policy-title").innerText = "Política de Privacidad";
        document.getElementById("last-updated").innerText = "Última actualización: 2 de mayo de 2026";
        document.getElementById("content").innerHTML = spanishContent;
    } else {
        document.getElementById("policy-title").innerText = "Privacy Policy";
        document.getElementById("last-updated").innerText = "Last Updated: May 2, 2026";
        document.getElementById("content").innerHTML = englishContent;
    }
}

// Load English by default
window.onload = () => {
    document.getElementById("content").innerHTML = englishContent;
};
</script>

</body>
</html>
